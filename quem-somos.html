<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem Somos - Float</title>
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffffff;
            --accent: #333333;
            --spacing: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--primary);
            background: var(--secondary);
        }

        /* --- HEADER & NAV (Igual à sua Index) --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .logo { font-weight: bold; font-size: 1.5rem; text-decoration: none; color: #000; }

        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #333; font-weight: 500; }

        .nav-hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .nav-hamburger span { width: 25px; height: 3px; background: #000; border-radius: 2px; }

        /* --- MOBILE MENU --- */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100%;
            background: #fff;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 40px;
            transition: 0.3s;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }

        .mobile-menu.active { right: 0; }
        .mobile-menu a { text-decoration: none; color: #000; font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; }
        .mobile-menu-close { align-self: flex-end; font-size: 2rem; margin-bottom: 30px; cursor: pointer; background: none; border: none; }

        /* --- CONTEÚDO --- */
        .content-section {
            padding: 120px 10% 60px 10%; /* Espaçamento superior para não ficar sob o menu fixo */
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 { font-size: 2.5rem; margin-bottom: 30px; }
        p { font-size: 1.1rem; margin-bottom: 20px; color: #444; }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-hamburger { display: flex; }
            .content-section { padding: 100px 25px 40px 25px; } /* Mais respiro nas laterais no mobile */
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">FLOAT</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="quem-somos.html">Quem somos</a></li>
        </ul>
        <div class="nav-hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <button class="mobile-menu-close" onclick="toggleMenu()">&times;</button>
        <a href="index.html" onclick="toggleMenu()">Home</a>
        <a href="quem-somos.html" onclick="toggleMenu()">Quem somos</a>
    </div>

    <section class="content-section">
        <h1>Quem Somos</h1>
        <p>A Float é um acelerador de produtos de fintech e uma consultoria boutique para infraestrutura financeira.</p>
        <p>Nossa missão é simplificar o acesso ao mercado financeiro e ajudar empresas a construírem soluções sólidas e inovadoras.</p>
    </section>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>
